server:
  port: 8085

spring:
  application:
    name: payment-service-ecommerce

  datasource:
    url: jdbc:mysql://mysql:3306/paymentdb?createDatabaseIfNotExist=true
    username: root
    password: darshan
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: kafka:9092

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true

management:
  tracing:
    enabled: false
    sampling:
      probability: 0.0

  # Uncomment these when Zipkin is running
  # zipkin:
  #   tracing:
  #     endpoint: http://zipkin:9411/api/v2/spans

  endpoints:
    web:
      exposure:
        include: "health,info,refresh"

  endpoint:
    health:
      probes:
        enabled: true
