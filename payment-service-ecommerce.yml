server:
  port: 8085

spring:
  application:
    name: payment-service-ecommerce

  datasource:
    url: jdbc:mysql://localhost:3306/paymentdb?createDatabaseIfNotExist=true
    username: root
    password: darshan
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  tracing:
    enabled: false        # <-- disables tracing so it won’t look for Zipkin
    sampling:
      probability: 0.0
  # zipkin:               # <-- comment out until Zipkin is running
  #   tracing:
  #     endpoint: http://localhost:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: "health,info,refresh"
