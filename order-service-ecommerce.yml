server:
  port: 8084

spring:
  application:
    name: order-service-ecommerce

  datasource:
    url: jdbc:mysql://localhost:3306/orderdb?createDatabaseIfNotExist=true
    username: root
    password: darshan
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092

  sleuth:
    sampler:
      probability: 1.0   # 100% sampling for tracing

  zipkin:
    base-url: http://localhost:9411  # Zipkin server URL
    sender:
      type: web

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
