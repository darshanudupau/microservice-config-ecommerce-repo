server:
  port: 8082

spring:
  application:
    name: cart-service-ecommerce

  datasource:
    url: jdbc:mysql://mysql:3306/cartdb?createDatabaseIfNotExist=true
    username: root
    password: darshan
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: kafka:9092

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh

  endpoint:
    health:
      probes:
        enabled: true
